<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wavelength - Boss Edition</title>
    <style>
        :root {
            --bg-color: #06060e; --panel-bg: #0f1021; --card-bg: #14162e;
            --neon-cyan: #00f0ff; --neon-magenta: #ff007f; --neon-purple: #9d00ff;
            --neon-green: #39ff14; --text-color: #ffffff; --text-muted: #646886;
            --border-color: #1b1d3a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 440px; }
        .main-panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 32px; padding: 28px 20px; display: none; flex-direction: column; gap: 15px; }
        .main-panel.active { display: flex; }
        .brand-title { font-size: 2rem; font-weight: 800; text-align: center; text-transform: uppercase; letter-spacing: 3px; color: var(--neon-cyan); margin-bottom: 20px; }
        .spectrum-area { position: relative; width: 100%; height: 90px; background: #030408; border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; margin: 10px 0; }
        .target-zone-wrapper { position: absolute; top: 0; bottom: 0; width: 20%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s ease; }
        .spectrum-area.visible .target-zone-wrapper { opacity: 1; }
        .zone-outer { position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: rgba(255,0,127,0.1); border-left: 2px solid var(--neon-magenta); border-right: 2px solid var(--neon-magenta); }
        .user-pointer { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 10; transform: translateX(-50%); }
        .btn { width: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-magenta)); border: none; color: #fff; padding: 15px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; padding: 12px; border-radius: 14px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-menu" class="main-panel active">
        <div class="brand-title">Wavelength</div>
        <button class="btn" onclick="openSetup()">Bosskampf starten</button>
    </div>

    <div id="scr-setup" class="main-panel">
        <input type="text" id="p-name" placeholder="Name eingeben..." style="padding:10px; border-radius:8px; border:none;">
        <button class="btn-secondary" onclick="addPlayer()">Spieler hinzufügen</button>
        <div id="tag-box" style="margin: 10px 0;"></div>
        <button class="btn" onclick="startGame()">Start</button>
    </div>

    <div id="scr-medium" class="main-panel">
        <div id="pair-text" style="text-align:center; font-weight:bold; margin-bottom:10px;"></div>
        <div class="spectrum-area" id="spec-med">
            <div class="target-zone-wrapper" id="zone-med"><div class="zone-outer"></div></div>
        </div>
        <button id="btn-scan" class="btn-secondary" onclick="revealTarget()">Zielbereich scannen</button>
        <button id="btn-next" class="btn hidden" onclick="passToTeam()">Hinweis übermittelt</button>
    </div>

    <div id="scr-team" class="main-panel">
        <div class="spectrum-area">
            <div class="user-pointer" id="pointer-team" style="left:50%;"></div>
        </div>
        <input type="range" id="guess-slider" style="width:100%;" min="0" max="100" value="50" oninput="move(this.value)">
        <button class="btn" onclick="finish()">Feuer!</button>
    </div>
</div>

<script>
    let state = { players: [], target: 50, currentPair: {l: "Leise", r: "Laut"} };

    function openSetup() { document.getElementById('scr-menu').classList.remove('active'); document.getElementById('scr-setup').classList.add('active'); }
    
    function addPlayer() {
        const name = document.getElementById('p-name').value;
        if(name) { state.players.push(name); document.getElementById('tag-box').innerHTML += `<div>${name}</div>`; }
    }

    function startGame() {
        document.getElementById('scr-setup').classList.remove('active');
        document.getElementById('scr-medium').classList.add('active');
        setupRound();
    }

    function setupRound() {
        state.target = Math.floor(Math.random() * 80) + 10;
        document.getElementById('zone-med').style.left = state.target + '%';
        document.getElementById('spec-med').classList.remove('visible');
        document.getElementById('btn-scan').classList.remove('hidden');
        document.getElementById('btn-next').classList.add('hidden');
    }

    function revealTarget() {
        document.getElementById('spec-med').classList.add('visible');
        document.getElementById('btn-scan').classList.add('hidden');
        document.getElementById('btn-next').classList.remove('hidden');
    }

    function passToTeam() {
        document.getElementById('scr-medium').classList.remove('active');
        document.getElementById('scr-team').classList.add('active');
    }

    function move(v) { document.getElementById('pointer-team').style.left = v + '%'; }

    function finish() { alert("Treffer geladen!"); location.reload(); }
</script>
</body>
</html>
