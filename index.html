<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wavelength - Full Logic</title>
    <style>
        :root {
            --bg-color: #06060e; --panel-bg: #0f1021; --card-bg: #14162e;
            --neon-cyan: #00f0ff; --neon-magenta: #ff007f; --neon-purple: #9d00ff;
            --neon-green: #39ff14; --text-color: #ffffff; --text-muted: #646886;
            --border-color: #1b1d3a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .container { width: 100%; max-width: 440px; }
        .main-panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 32px; padding: 28px 20px; display: none; flex-direction: column; gap: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .main-panel.active { display: flex; }
        .btn { background: linear-gradient(90deg, var(--neon-purple), var(--neon-magenta)); border: none; color: #fff; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-secondary { background: var(--card-bg); border: 1px solid var(--border-color); color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; }
        /* Spectrum Logic */
        .spectrum-area { position: relative; width: 100%; height: 90px; background: #030408; border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; margin: 12px 0; }
        .target-zone-wrapper { position: absolute; top: 0; bottom: 0; width: 20%; transform: translateX(-50%); opacity: 0; transition: opacity 0.4s ease; }
        .spectrum-area.visible .target-zone-wrapper { opacity: 1; }
        .zone-outer { position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: rgba(255,0,127,0.04); border-left: 2px solid rgba(255,0,127,0.3); border-right: 2px solid rgba(255,0,127,0.3); }
        .user-pointer { position: absolute; top: 0; bottom: 0; width: 2px; background: #fff; transform: translateX(-50%); z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-menu" class="main-panel active">
        <div class="brand-title" style="font-size:2rem; text-align:center; color:var(--neon-cyan);">WAVELENGTH</div>
        <div class="menu-card" onclick="alert('Kreis-Duell startet...')">PvP Modus</div>
        <div class="menu-card" onclick="openBossSetup()">Bosskampf</div>
    </div>

    <div id="scr-setup" class="main-panel">
        <input type="text" id="p-name" placeholder="Name..." style="padding:10px; border-radius:8px; background:#090a14; color:#fff; border:1px solid #1b1d3a;">
        <button class="btn-secondary" onclick="addPlayer()">Hinzufügen</button>
        <div id="tag-box"></div>
        <button class="btn" onclick="startGame()">System Start</button>
    </div>

    <div id="scr-medium" class="main-panel">
        <div id="pair-text" style="text-align:center;">Sender-Phase</div>
        <div class="spectrum-area" id="spec-med">
            <div class="target-zone-wrapper" id="zone-med"><div class="zone-outer"></div></div>
        </div>
        <button class="btn" id="btn-scan" onclick="scanTarget()">Zielbereich scannen</button>
        <button class="btn" id="btn-next" style="display:none;" onclick="passToTeam()">Hinweis übermittelt</button>
    </div>

    <div id="scr-team" class="main-panel">
        <div class="spectrum-area"><div class="user-pointer" id="pointer-team" style="left:50%;"></div></div>
        <input type="range" id="slider" min="0" max="100" value="50" oninput="move(this.value)">
        <button class="btn" onclick="revealResolution()">Laser abfeuern</button>
    </div>
</div>

<script>
    let players = [];
    let target = 50;

    function openBossSetup() { document.getElementById('scr-menu').classList.remove('active'); document.getElementById('scr-setup').classList.add('active'); }
    
    function addPlayer() {
        const name = document.getElementById('p-name').value;
        if(name) { players.push(name); document.getElementById('tag-box').innerHTML += `<div>${name}</div>`; }
    }

    function startGame() {
        if(players.length < 2) { alert("Zu wenig Spieler!"); return; }
        document.getElementById('scr-setup').classList.remove('active');
        document.getElementById('scr-medium').classList.add('active');
        setupRound();
    }

    function setupRound() {
        target = Math.floor(Math.random()*80)+10;
        document.getElementById('zone-med').style.left = target + '%';
        // Hier wird der Bereich versteckt!
        document.getElementById('spec-med').classList.remove('visible');
        document.getElementById('btn-scan').style.display = 'block';
        document.getElementById('btn-next').style.display = 'none';
    }

    // Die Scan-Logik:
    function scanTarget() {
        document.getElementById('spec-med').classList.add('visible');
        document.getElementById('btn-scan').style.display = 'none';
        document.getElementById('btn-next').style.display = 'block';
    }

    function passToTeam() {
        document.getElementById('scr-medium').classList.remove('active');
        document.getElementById('scr-team').classList.add('active');
    }

    function move(v) { document.getElementById('pointer-team').style.left = v + '%'; }

    function revealResolution() {
        alert("Welle abgeschlossen!");
        location.reload();
    }
</script>
</body>
</html>
