<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Monster Hunt</title>
    <style>
        :root {
            /* Dein neues Farbschema: Etwas elektrischer */
            --primary: #bc13fe; 
            --secondary: #00f2ff;
            --bg: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.7);
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
            text-align: center;
        }
        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 12px 25px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--secondary);
            color: var(--bg);
            box-shadow: 0 0 15px var(--secondary);
        }
        input {
            background: #1a1a24;
            border: none;
            border-bottom: 2px solid var(--primary);
            color: white;
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-content">
        <h1>Cyber Monster Hunt</h1>
        <p>System bereit. Namen eingeben:</p>
        <input type="text" id="playerName" placeholder="Spielername...">
        <br>
        <button class="btn" onclick="Game.addPlayer()">Hinzufügen +</button>
        <div id="player-list"></div>
    </div>
</div>

<script>
const Game = {
    players: [],
    addPlayer() {
        const input = document.getElementById('playerName');
        if(input.value) {
            this.players.push(input.value);
            document.getElementById('player-list').innerHTML += `<p>🚀 ${input.value}</p>`;
            input.value = '';
        }
    }
};
</script>
</body>
</html>
